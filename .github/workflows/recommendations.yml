name: Instrument Recommendation Job

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday 2 AM UTC
  workflow_dispatch:

jobs:
  run-recommendation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r ml/requirements.txt

      - name: Create Firebase service key
        run: |
          cat << 'EOF' > serviceAccountKey.json
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF

      - name: Run recommendation script
        run: |
          python ml/model/recommend_instruments.py